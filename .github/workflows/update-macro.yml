name: Update Macro Cache

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Fetch macro data
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: |
          mkdir -p public
          node scripts/fetchMacroCache.js

      - name: Push via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 public/macro-cache.json)
          SHA=$(gh api repos/vagheit-jpg/sequoia/contents/public/macro-cache.json --jq '.sha' 2>/dev/null || echo "")
          if [ -z "$SHA" ]; then
            gh api repos/vagheit-jpg/sequoia/contents/public/macro-cache.json \
              --method PUT \
              -f message="chore: update macro cache [skip ci]" \
              -f content="$CONTENT"
          else
            gh api repos/vagheit-jpg/sequoia/contents/public/macro-cache.json \
              --method PUT \
              -f message="chore: update macro cache [skip ci]" \
              -f content="$CONTENT" \
              -f sha="$SHA"
          fi
