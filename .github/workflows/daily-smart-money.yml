name: 세콰이어 스마트머니 일별 수집

on:
  schedule:
    # 매일 장마감 후 16:30 KST (UTC 07:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      target_date:
        description: '수집 날짜 (YYYYMMDD, 비워두면 어제)'
        required: false
        default: ''

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install pykrx supabase pandas

      - name: 스마트머니 수집 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python scripts/collectSmartMoney.py ${{ github.event.inputs.target_date }}
          else
            python scripts/collectSmartMoney.py
          fi

      - name: 수집 결과 알림 (선택)
        if: failure()
        run: |
          echo "❌ 스마트머니 수집 실패: $(date)"
