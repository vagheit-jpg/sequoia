<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SEQUOIA QUANTUM™</title>
    <style>
      /* 1. 모든 요소의 튕김 및 바운스 원천 차단 */
      * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
        -webkit-overflow-scrolling: touch; /* 부드러운 스크롤 유지 */
      }
      
      /* 2. html과 body의 배경색을 투명하게 하거나 시스템 기본에 맡김 */
      html, body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 100%;
        height: 100%;
        /* [중요] 스크롤 바운스 효과를 완전히 제거하여 바닥 노출 자체를 금지 */
        position: fixed; 
        overflow: hidden;
        overscroll-behavior: none !important;
      }

      /* 3. 실제 스크롤이 일어나는 root 영역만 스크롤 허용 */
      #root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        /* 여기서 테마별 배경색을 지정 (App.jsx에서 칠하는 색과 일치) */
      }

      /* 시스템 다크모드 강제 대응 */
      @media (prefers-color-scheme: dark) {
        html, body { background-color: #040710 !important; }
      }
      @media (prefers-color-scheme: light) {
        html, body { background-color: #f2f4f8 !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
