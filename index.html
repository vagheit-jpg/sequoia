<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <style>
    /* 1. 전체 높이 제한을 풀고 자연스러운 스크롤을 복원 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      /* height: 100%와 overflow: hidden을 과감히 삭제합니다. */
      min-height: 100vh; 
      
      /* [핵심] 튕길 때 검은색이 보이지 않도록 '튕김 애니메이션'만 정밀 타격 */
      overscroll-behavior-y: none !important;
    }

    #root {
      width: 100%;
      /* 콘텐츠가 길어지는 대로 무제한 확장 */
      min-height: 100vh;
    }

    /* 2. 테마별 배경색 (튕길 때 검은 배경 대신 이 색이 보이게 됨) */
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #040710 !important; }
    }
    @media (prefers-color-scheme: light) {
      html, body { background-color: #f2f4f8 !important; }
    }
/* PC 스크롤바 커스텀 (디자인 일체감) */
      #root::-webkit-scrollbar { width: 6px; }
      #root::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px; }
  </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
