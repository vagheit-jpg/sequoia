<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SEQUOIA QUANTUM™</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      /* 2. 바디 설정 (이 안에 속성들이 정확히 들어가야 합니다) */
      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
        
        /* [수정 핵심] 반드시 body { ... } 중괄호 안에 있어야 작동합니다 */
        overscroll-behavior-y: none;  /* 모바일 위아래 튕김 방지 */
        overflow-x: hidden;           /* 가로 흔들림 방지 */
        
        /* [PC 스크롤 복구] 높이를 100%로 고정하지 않고 자동(auto)으로 둡니다 */
        overflow-y: auto;
        min-height: 100vh;
      }

      /* 3. 리액트 루트 설정 */
      #root {
        width: 100%;
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
