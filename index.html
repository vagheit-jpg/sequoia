<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SEQUOIA QUANTUM™</title>
    <style>
      /* 1. 기본 초기화 */
      * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
      }
      
      /* 2. html, body 설정: 튕김 방지와 배경색 결정 */
      html, body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        width: 100%;
        /* [수정] position: fixed를 제거하고 최소 높이만 확보합니다 */
        min-height: 100%; 
        /* 스크롤 바운스 효과 제거 (블랙박스 방어의 핵심) */
        overscroll-behavior-y: none !important;
        /* 스크롤 허용 */
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* 3. root 영역: 콘텐츠 길이에 따라 무한히 늘어나게 설정 */
      #root {
        width: 100%;
        min-height: 100vh; /* 화면 높이만큼 최소 확보 */
        display: flex;
        flex-direction: column;
        /* 콘텐츠가 길어지면 자연스럽게 늘어나며 스크롤 생성 */
      }

      /* 시스템 테마에 따른 배경색 강제 대응 (잔상 제거) */
      @media (prefers-color-scheme: dark) {
        html, body { background-color: #040710 !important; }
      }
      @media (prefers-color-scheme: light) {
        html, body { background-color: #f2f4f8 !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
