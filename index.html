<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SEQUOIA QUANTUM™</title>
    <style>
      /* 1. 브라우저 레벨의 스크롤 및 바운스 통제 */
      html, body { 
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%; /* 화면 꽉 채우기 */
        /* [핵심] body 자체의 스크롤을 끄고 바운스 전파를 막습니다 */
        overflow: hidden; 
        overscroll-behavior: none;
      }

      /* 2. 실제 앱이 구동되는 root 영역 (여기서만 스크롤 발생) */
      #root {
        width: 100%;
        height: 100%; /* 부모(body)의 100%를 그대로 상속 */
        /* [중요] PC/모바일 모두 여기서 스크롤이 일어나게 설정 */
        overflow-y: auto; 
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch; /* 모바일 부드러운 스크롤 */
      }

      /* 3. 테마별 배경색 (잔상 방어막) */
      @media (prefers-color-scheme: dark) {
        html, body, #root { background-color: #040710 !important; }
      }
      @media (prefers-color-scheme: light) {
        html, body, #root { background-color: #f2f4f8 !important; }
      }

      /* PC 스크롤바 커스텀 (디자인 일체감) */
      #root::-webkit-scrollbar { width: 6px; }
      #root::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
