<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <!-- 상태바 색 -->
  <meta name="theme-color" content="#f2f4f8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#040710" media="(prefers-color-scheme: dark)" />

  <title>SEQUOIA QUANTUM™</title>

  <style>
    :root {
      --bg-light: #f2f4f8;
      --bg-dark: #040710;
      --text-light: #0f172a;
      --text-dark: #f8fafc;
    }

    /* 기본 초기화 */
    html, body, #root {
      margin: 0;
      padding: 0;
      width: 100%;
    }

    /* 🔥 핵심: 전체 배경 통일 */
    html {
      background: var(--bg-light);
      overscroll-behavior-y: none;
    }

    body {
      min-height: 100dvh;
      background: var(--bg-light);
      color: var(--text-light);
      overscroll-behavior-y: none;
      -webkit-overflow-scrolling: touch;
    }

    #root {
      min-height: 100dvh;
      background: inherit;
    }

    /* 다크모드 자동 */
    @media (prefers-color-scheme: dark) {
      html, body, #root {
        background: var(--bg-dark);
        color: var(--text-dark);
      }
    }

    /* 수동 테마 */
    body.light-theme, body.light-theme #root {
      background: var(--bg-light) !important;
      color: var(--text-light) !important;
    }

    body.dark-theme, body.dark-theme #root {
      background: var(--bg-dark) !important;
      color: var(--text-dark) !important;
    }

    /* =========================
       📱 모바일 전용 (핵심 해결)
       ========================= */
    @media (max-width: 768px) {

      html, body {
        height: 100%;
        min-height: 100dvh;
        overflow-x: hidden;
        overscroll-behavior: none;
      }

      /* 🔥 스크롤바 제거 */
      body::-webkit-scrollbar {
        display: none;
      }

      /* 🔥 하단 튐 방지 */
      body {
        position: fixed;
        width: 100%;
      }

      #root {
        overflow-y: auto;
        height: 100dvh;
        -webkit-overflow-scrolling: touch;
      }
    }

    /* =========================
       🖥 PC 전용
       ========================= */
    @media (min-width: 769px) {

      html, body {
        overflow-y: auto;
        overflow-x: hidden;
      }

      body {
        min-height: 100vh;
      }

      #root {
        min-height: 100vh;
      }
    }

  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
