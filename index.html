<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>SEQUOIA QUANTUM™</title>
  <style>
    /* 1. 최상위 레이어에서 바운스 현상만 정밀 차단 */
    html {
      overflow: hidden; /* html은 고정하여 캔버스 이탈 방지 */
      height: 100%;
      overscroll-behavior: none;
    }

    /* 2. body를 실제 스크롤 주체로 설정 (PC 휠 스크롤 복구 핵심) */
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      /* [중요] 여기서 스크롤을 허용해야 PC 마우스 휠이 작동합니다 */
      overflow-y: auto; 
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    /* 3. root 영역: 콘텐츠 길이에 맞춰 시원하게 확장 */
    #root {
      width: 100%;
      min-height: 100vh; /* 화면 높이만큼 최소 확보 (압축 방지) */
      display: flex;
      flex-direction: column;
    }

    /* 4. 테마별 배경색 (튕길 틈이 없어도 잔상 방어를 위해 필수) */
    @media (prefers-color-scheme: dark) {
      html, body { background-color: #040710 !important; }
    }
    @media (prefers-color-scheme: light) {
      html, body { background-color: #f2f4f8 !important; }
    }

    /* PC 스크롤바 디자인 (세콰이어 시스템의 세련미 유지) */
    body::-webkit-scrollbar { width: 8px; }
    body::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.4); border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
